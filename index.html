<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sort.Viz — Sorting Algorithm Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <div class="nav-logo">SORT<span>.</span>VIZ</div>
    <button class="theme-btn" id="themeBtn">◐ THEME</button>
  </nav>

  <div class="app" id="app">

    <div class="top-bar" id="topBar">
      <div class="algo-tabs" id="algoTabs">
        <button class="algo-tab active" data-algo="bubble">BUBBLE</button>
        <button class="algo-tab" data-algo="selection">SELECTION</button>
        <button class="algo-tab" data-algo="insertion">INSERTION</button>
        <button class="algo-tab" data-algo="merge">MERGE</button>
        <button class="algo-tab" data-algo="quick">QUICK</button>
        <button class="algo-tab" data-algo="heap">HEAP</button>
        <button class="algo-tab" data-algo="counting">COUNTING</button>
        <button class="algo-tab" data-algo="radix">RADIX</button>
      </div>
      <div class="sep"></div>
      <button class="ctrl-btn play" id="playBtn">▶ PLAY</button>
      <button class="ctrl-btn" id="pauseBtn" disabled>⏸ PAUSE</button>
      <button class="ctrl-btn danger" id="resetBtn">↺ RESET</button>
      <div class="sep"></div>
      <div class="slider-wrap">
        <label>SPEED</label>
        <input type="range" id="speedSlider" min="1" max="100" value="60" />
      </div>
      <div class="sep"></div>
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="normal">NORMAL</button>
        <button class="mode-tab" data-mode="step">STEP</button>
      </div>
    </div>

    <div class="canvas-area" id="canvasArea">
      <canvas id="mainCanvas"></canvas>
    </div>

    <div class="step-controls" id="stepControls" style="display:none">
      <button class="step-btn" id="stepBack">← PREV</button>
      <span class="step-info" id="stepInfo">STEP 0 / 0</span>
      <button class="step-btn" id="stepFwd">NEXT →</button>
      <span class="step-hint">or use ← → arrow keys</span>
    </div>

    <div class="side-panel" id="sidePanel">

      <div class="panel-section">
        <div class="panel-label">Live Stats</div>
        <div class="stats-grid">
          <div class="stat-box comp"><span class="stat-val" id="statComp">0</span><span class="stat-lbl">COMPARISONS</span></div>
          <div class="stat-box swap"><span class="stat-val" id="statSwap">0</span><span class="stat-lbl">SWAPS</span></div>
          <div class="stat-box time"><span class="stat-val" id="statTime">0ms</span><span class="stat-lbl">ELAPSED</span></div>
          <div class="stat-box steps"><span class="stat-val" id="statStep">0</span><span class="stat-lbl">STEPS</span></div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-label">Comparisons Over Time</div>
        <canvas id="liveGraph"></canvas>
      </div>

      <div class="panel-section">
        <div class="panel-label">What's Happening</div>
        <div class="why-box" id="whyBox">Select an algorithm and press PLAY to begin.</div>
      </div>

      <div class="panel-section">
        <div class="panel-label">Algorithm Info</div>
        <div class="complexity-grid" id="complexityGrid"></div>
      </div>

      <div class="panel-section">
        <div class="panel-label">Visual Style</div>
        <div class="vis-btns">
          <button class="vis-btn active" data-vis="bars"><span class="vis-dot"></span>BAR CHART</button>
          <button class="vis-btn" data-vis="dots"><span class="vis-dot"></span>SCATTER DOTS</button>
          <button class="vis-btn" data-vis="radial"><span class="vis-dot"></span>CIRCULAR / RADIAL</button>
          <button class="vis-btn" data-vis="wave"><span class="vis-dot"></span>WAVEFORM</button>
          <button class="vis-btn" data-vis="spectrum"><span class="vis-dot"></span>COLOR SPECTRUM</button>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">SHOW VALUES</span>
          <label class="toggle">
            <input type="checkbox" id="showValues" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-label">Array Data</div>
        <div class="data-btns">
          <button class="data-btn active" data-preset="random">RANDOM</button>
          <button class="data-btn" data-preset="nearly">NEARLY SORTED</button>
          <button class="data-btn" data-preset="reversed">REVERSED</button>
          <button class="data-btn" data-preset="dupes">ALL DUPES</button>
          <button class="data-btn" data-preset="sawtooth">SAWTOOTH</button>
        </div>
        <div class="size-wrap">
          <label>SIZE: <span id="sizeVal">60</span></label>
          <input type="range" id="sizeSlider" min="10" max="200" value="60" />
        </div>
        <input class="custom-input" id="customInput" placeholder="Custom: 5, 3, 8, 1, 9, 2, ..." />
        <button class="ctrl-btn custom-apply" id="applyCustom">APPLY CUSTOM ARRAY</button>
      </div>

      <div class="panel-section">
        <div class="panel-label">Algorithm History</div>
        <div class="history-list" id="historyList">
          <div class="history-empty">No runs yet.</div>
        </div>
        <button class="clear-btn" id="clearHistory">CLEAR HISTORY</button>
      </div>

    </div>
  </div>

  <script src="js/algorithms/bubble.js"></script>
  <script src="js/algorithms/selection.js"></script>
  <script src="js/algorithms/insertion.js"></script>
  <script src="js/algorithms/merge.js"></script>
  <script src="js/algorithms/quick.js"></script>
  <script src="js/algorithms/heap.js"></script>
  <script src="js/algorithms/counting.js"></script>
  <script src="js/algorithms/radix.js"></script>
  <script src="js/data.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/history.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
